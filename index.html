<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficcion OS</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
    }

    .container {
      padding: 20px;
    }

    button {
      margin: 5px;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    textarea {
      width: 90%;
      height: 100px;
      margin: 10px auto;
      border-radius: 10px;
      padding: 10px;
      border: none;
      font-size: 14px;
    }

    .saved {
      background: #020617;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }

    .actions {
      margin-top: 5px;
    }

    .delete {
      background: #dc2626;
    }

    .edit {
      background: #f59e0b;
    }
  </style>
</head>

<body>

<header>Ficcion OS 🚀</header>

<div class="container">

  <h2>Agentes IA</h2>
  <button onclick="openAI('chatgpt')">ChatGPT</button>
  <button onclick="openAI('claude')">Claude</button>
  <button onclick="openAI('deepseek')">DeepSeek</button>

  <h2>Guardar idea / prompt</h2>
  <textarea id="idea" placeholder="Escribe aquí tu idea..."></textarea>
  <br>
  <button onclick="saveIdea()">Guardar</button>

  <h2>Memoria</h2>
  <div id="memory"></div>

</div>

<script>

function openAI(agent) {
  let prompt = encodeURIComponent(document.getElementById("idea").value || "Ayúdame a construir mi ecosistema de agentes IA");

  let urls = {
    chatgpt: `https://chat.openai.com/?q=${prompt}`,
    claude: `https://claude.ai/new?q=${prompt}`,
    deepseek: `https://chat.deepseek.com/?q=${prompt}`
  };

  window.open(urls[agent], '_blank');
}

function getMemory() {
  return JSON.parse(localStorage.getItem("ideas")) || [];
}

function setMemory(memory) {
  localStorage.setItem("ideas", JSON.stringify(memory));
}

function saveIdea() {
  let idea = document.getElementById("idea").value;
  if (!idea) return;

  let memory = getMemory();
  memory.push(idea);
  setMemory(memory);

  document.getElementById("idea").value = "";
  loadMemory();
}

function deleteIdea(index) {
  let memory = getMemory();
  memory.splice(index, 1);
  setMemory(memory);
  loadMemory();
}

function editIdea(index) {
  let memory = getMemory();
  let nueva = prompt("Editar idea:", memory[index]);
  if (nueva !== null) {
    memory[index] = nueva;
    setMemory(memory);
    loadMemory();
  }
}

function loadMemory() {
  let memory = getMemory();
  let container = document.getElementById("memory");
  container.innerHTML = "";

  memory.slice().reverse().forEach((item, i) => {
    let index = memory.length - 1 - i;

    let div = document.createElement("div");
    div.className = "saved";

    let text = document.createElement("div");
    text.innerText = item;

    let actions = document.createElement("div");
    actions.className = "actions";

    let editBtn = document.createElement("button");
    editBtn.innerText = "Editar";
    editBtn.className = "edit";
    editBtn.onclick = () => editIdea(index);

    let delBtn = document.createElement("button");
    delBtn.innerText = "Borrar";
    delBtn.className = "delete";
    delBtn.onclick = () => deleteIdea(index);

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    div.appendChild(text);
    div.appendChild(actions);

    container.appendChild(div);
  });
}

loadMemory();

</script>

</body>
</html>
