<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficcion OS</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
    }

    .container {
      padding: 20px;
    }

    select, textarea {
      width: 90%;
      margin: 10px auto;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button {
      margin: 5px;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .saved {
      background: #020617;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      text-align: left;
    }

    .actions {
      margin-top: 5px;
    }

    .delete { background: #dc2626; }
    .edit { background: #f59e0b; }
  </style>
</head>

<body>

<header>Ficcion OS 🚀</header>

<div class="container">

  <h2>Agentes IA</h2>
  <button onclick="openAI('chatgpt')">ChatGPT</button>
  <button onclick="openAI('claude')">Claude</button>
  <button onclick="openAI('deepseek')">DeepSeek</button>

  <h2>Guardar idea</h2>

  <select id="category">
    <option value="ideas">Ideas</option>
    <option value="ia">IA</option>
    <option value="codigo">Código</option>
    <option value="negocio">Negocio</option>
    <option value="tlamatiliztli">Tlamatiliztli</option>
  </select>

  <textarea id="idea" placeholder="Escribe aquí..."></textarea>
  <button onclick="saveIdea()">Guardar</button>

  <h2>Memoria</h2>
  <div id="memory"></div>

</div>

<script>

function openAI(agent) {
  let prompt = encodeURIComponent(document.getElementById("idea").value || "Ayúdame a construir mi ecosistema de agentes IA");

  let urls = {
    chatgpt: `https://chat.openai.com/?q=${prompt}`,
    claude: `https://claude.ai/new?q=${prompt}`,
    deepseek: `https://chat.deepseek.com/?q=${prompt}`
  };

  window.open(urls[agent], '_blank');
}

function getMemory() {
  return JSON.parse(localStorage.getItem("ideas")) || [];
}

function setMemory(memory) {
  localStorage.setItem("ideas", JSON.stringify(memory));
}

function saveIdea() {
  let text = document.getElementById("idea").value;
  let category = document.getElementById("category").value;

  if (!text) return;

  let memory = getMemory();
  memory.push({ text, category });
  setMemory(memory);

  document.getElementById("idea").value = "";
  loadMemory();
}

function deleteIdea(index) {
  let memory = getMemory();
  memory.splice(index, 1);
  setMemory(memory);
  loadMemory();
}

function editIdea(index) {
  let memory = getMemory();
  let nueva = prompt("Editar:", memory[index].text);
  if (nueva !== null) {
    memory[index].text = nueva;
    setMemory(memory);
    loadMemory();
  }
}

function loadMemory() {
  let memory = getMemory();
  let container = document.getElementById("memory");
  container.innerHTML = "";

  let categories = {};

  memory.forEach((item, index) => {
    if (!categories[item.category]) categories[item.category] = [];
    categories[item.category].push({ ...item, index });
  });

  Object.keys(categories).forEach(cat => {
    let title = document.createElement("h3");
    title.innerText = cat.toUpperCase();
    container.appendChild(title);

    categories[cat].slice().reverse().forEach(item => {
      let div = document.createElement("div");
      div.className = "saved";

      let text = document.createElement("div");
      text.innerText = item.text;

      let actions = document.createElement("div");
      actions.className = "actions";

      let editBtn = document.createElement("button");
      editBtn.innerText = "Editar";
      editBtn.className = "edit";
      editBtn.onclick = () => editIdea(item.index);

      let delBtn = document.createElement("button");
      delBtn.innerText = "Borrar";
      delBtn.className = "delete";
      delBtn.onclick = () => deleteIdea(item.index);

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      div.appendChild(text);
      div.appendChild(actions);

      container.appendChild(div);
    });
  });
}

loadMemory();

</script>

</body>
</html>
