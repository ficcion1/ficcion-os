<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficcion OS</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
    }

    .container {
      padding: 20px;
    }

    button {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <header>
    Ficcion OS 🚀
  </header>

  <div class="container">
    <h2>Agentes IA</h2>

    <button onclick="openAI('chatgpt')">Abrir ChatGPT</button>
    <button onclick="openAI('claude')">Abrir Claude</button>
    <button onclick="openAI('deepseek')">Abrir DeepSeek</button>
  </div>

  <script>
    function openAI(agent) {
      let prompt = encodeURIComponent("Actúa como un sistema operativo de agentes IA. Ayúdame a construir mi ecosistema.");

      let urls = {
        chatgpt: `https://chat.openai.com/?q=${prompt}`,
        claude: `https://claude.ai/new?q=${prompt}`,
        deepseek: `https://chat.deepseek.com/?q=${prompt}`
      };

      window.open(urls[agent], '_blank');
    }
  </script>

</body>
</html>
